<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email-Validator-- iValidate</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <nav>
            <div class="logo">iValidate <i class="fa-solid fa-envelope-circle-check"></i></div>
            
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">About us</a></li>
                <li><a href="/">Contact us</a></li>
                
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Enter your email to validate</h1>
            <form action="/submit" method="post">
                <!-- Input Filed to Validate Email Address -->
                 <label for="username">Username</label> 
                <input placeholder="Enter your email to validate" type="text" id="username" name="username" required>
                <br>
                <!-- <label for="password">Password</label> 
                <input  type="text" id="Password" name="password" required> -->
                <br>
                <!-- Submit button -->
                <input id="submitBtn" class="btn" type="submit" value="Submit">
              </form>
        </div>
        <div class="container">
            <h1>Your Results</h1>
            <!-- <p>Your result will show here...</p> -->
            
            <div id="resultCont">

            </div>
        </div>
    </main>

    <footer>
       <pre>copyright <i class="fa-regular fa-copyright"></i> | iValidate | All rights reserved </pre> 

    </footer>
    <script src="app.js"></script>
</body>
</html>
